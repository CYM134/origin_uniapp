spring:
  application:
    name: lab-reservation-backend
  profiles:
    default: dev
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:20MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:20MB}

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  redis-session:
    enabled: ${REDIS_AUTH_SESSION_ENABLED:true}

# AI 校园助手配置（可选）。未配置 api-url / api-key 时，后端自动降级为内置规则问答。
# 密钥仅通过环境变量注入，严禁硬编码：AI_ENABLED=true AI_API_URL=... AI_API_KEY=... AI_MODEL=...
ai:
  enabled: ${AI_ENABLED:false}
  api-url: ${AI_API_URL:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-3.5-turbo}
  require-api-key: ${AI_REQUIRE_API_KEY:true}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:20}

cache:
  redis:
    enabled: ${REDIS_CACHE_ENABLED:true}
    dashboard-ttl-seconds: ${REDIS_DASHBOARD_TTL_SECONDS:30}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  login-per-minute: ${RATE_LIMIT_LOGIN_PER_MINUTE:10}
  register-per-five-minutes: ${RATE_LIMIT_REGISTER_PER_FIVE_MINUTES:5}
  ai-per-minute: ${RATE_LIMIT_AI_PER_MINUTE:30}

storage:
  minio:
    enabled: ${MINIO_ENABLED:true}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:campus-files}

messaging:
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:true}
    notification-exchange: ${RABBITMQ_NOTIFICATION_EXCHANGE:campus.notification.exchange}
    notification-queue: ${RABBITMQ_NOTIFICATION_QUEUE:campus.notification.queue}
    notification-routing-key: ${RABBITMQ_NOTIFICATION_ROUTING_KEY:campus.notification.created}

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
