spring:
  application:
    name: lab-reservation-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql6.sqlpub.com:3311/company_level?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:super_admin666}
    password: ${DB_PASSWORD:03cCT9fozmtt7BcT}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

# AI 校园助手配置（可选）。未配置 api-url / api-key 时，后端自动降级为内置规则问答。
# 密钥仅通过环境变量注入，严禁硬编码：AI_ENABLED=true AI_API_URL=... AI_API_KEY=... AI_MODEL=...
ai:
  enabled: ${AI_ENABLED:false}
  api-url: ${AI_API_URL:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-3.5-turbo}

logging:
  level:
    root: INFO
