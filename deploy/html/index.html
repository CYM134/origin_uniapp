<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实验室空间预约与协同管理系统</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f5f7fb;
    }
    main {
      width: min(560px, calc(100vw - 40px));
      padding: 32px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 8px 0;
      line-height: 1.7;
    }
    code {
      padding: 2px 6px;
      border-radius: 4px;
      background: #eef2ff;
      color: #3730a3;
    }
  </style>
</head>
<body>
  <main>
    <h1>实验室空间预约与协同管理系统</h1>
    <p>Nginx 已启动，后端接口可通过 <code>/api/</code> 反向代理访问。</p>
    <p>构建 uni-app H5 后，将 <code>.env</code> 中的 <code>NGINX_HTML_DIR</code> 指向 H5 构建目录即可展示正式前端。</p>
  </main>
</body>
</html>
